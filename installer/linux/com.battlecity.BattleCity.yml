app-id: com.battlecity.BattleCity
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: battle-city

finish-args:
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --device=input
  - --filesystem=xdg-data/BattleCity:create

modules:
  # Pinned Python wheels (pyinstaller + runtime deps).
  # Regenerate with:
  #   uv run --python 3.13 --with requirements-parser --with packaging \
  #     tools/flatpak-pip-generator --runtime org.freedesktop.Sdk//25.08 \
  #     --prefer-wheels pygame,pyinstaller \
  #     --yaml --output python-deps pyinstaller pygame loguru pytmx
  - python-deps.yaml

  - name: battle-city
    buildsystem: simple
    build-options:
      env:
        PYTHONPATH: /app/lib/python3.13/site-packages
    build-commands:
      # Freeze the game with PyInstaller inside the SDK so bundled shared libs
      # are ABI-matched to the runtime (fixes host glibc vs runtime glibc drift).
      - pyinstaller battle-city.spec --noconfirm --workpath build --distpath dist
      - install -d /app/lib/battle-city /app/bin
      - cp -r dist/BattleCity/. /app/lib/battle-city/
      # Drop the build-time Python deps: the frozen dist vendors its own
      # ABI-matched pygame and libpython, so site-packages, pygame headers,
      # and PyInstaller entry points are dead weight at runtime (~10MB in
      # the bundle).
      - rm -rf /app/lib/python3.13 /app/include/python3.13 /app/bin/pyinstaller /app/bin/pyi-*
      - ln -s /app/lib/battle-city/BattleCity /app/bin/battle-city
      - install -Dm644 com.battlecity.BattleCity.desktop /app/share/applications/com.battlecity.BattleCity.desktop
      - install -Dm644 assets/icons/battle-city-64.png /app/share/icons/hicolor/64x64/apps/com.battlecity.BattleCity.png
      - install -Dm644 assets/icons/battle-city-128.png /app/share/icons/hicolor/128x128/apps/com.battlecity.BattleCity.png
      - install -Dm644 assets/icons/battle-city-256.png /app/share/icons/hicolor/256x256/apps/com.battlecity.BattleCity.png
    sources:
      - type: file
        path: ../../main.py
      - type: file
        path: ../../battle-city.spec
      - type: dir
        path: ../../src
        dest: src
      - type: dir
        path: ../../assets
        dest: assets
      - type: file
        path: com.battlecity.BattleCity.desktop
