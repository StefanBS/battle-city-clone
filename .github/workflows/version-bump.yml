name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine bump type from labels
        id: bump-type
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:patch"'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no release label
        if: steps.bump-type.outputs.type == 'none'
        run: echo "No release label found. Skipping version bump."

      - name: Generate GitHub App token
        if: steps.bump-type.outputs.type != 'none'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        if: steps.bump-type.outputs.type != 'none'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        if: steps.bump-type.outputs.type != 'none'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install bump-my-version
        if: steps.bump-type.outputs.type != 'none'
        run: pip install bump-my-version

      - name: Configure git
        if: steps.bump-type.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: steps.bump-type.outputs.type != 'none'
        run: bump-my-version bump ${{ steps.bump-type.outputs.type }}

      - name: Push changes and tag
        if: steps.bump-type.outputs.type != 'none'
        run: git push --follow-tags
